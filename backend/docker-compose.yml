services:
  mongo:
    image: mongo:7
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 20

  mongo-init:
    image: mongo:7
    depends_on:
      mongo:
        condition: service_healthy
    restart: "no"
    command:
      - mongosh
      - --host
      - mongo:27017
      - --eval
      - >-
        try { rs.status() } catch (e) {
          rs.initiate({_id:'rs0',members:[{_id:0,host:'mongo:27017'}]})
        }

  backend:
    build: .
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/lms?replicaSet=rs0
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-brevo}
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      SENDINBLUE_API_KEY: ${SENDINBLUE_API_KEY:-}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-Northstar Learning}
      EMAIL_FROM: ${EMAIL_FROM:-}
      BREVO_SENDER_NAME: ${BREVO_SENDER_NAME:-}
      BREVO_SENDER_EMAIL: ${BREVO_SENDER_EMAIL:-}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASS: ${EMAIL_PASS:-}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_CONNECTION_TIMEOUT: ${SMTP_CONNECTION_TIMEOUT:-30000}
      SMTP_GREETING_TIMEOUT: ${SMTP_GREETING_TIMEOUT:-15000}
      SMTP_SOCKET_TIMEOUT: ${SMTP_SOCKET_TIMEOUT:-30000}
      TRUST_PROXY: "false"
    depends_on:
      mongo-init:
        condition: service_completed_successfully
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mongo_data:
